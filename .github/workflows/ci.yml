name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      # Le lint/typecheck typés résolvent @df/shared via son `dist/` et l'API via
      # le client Prisma généré : il faut donc produire ces artefacts avant les
      # vérifications, sinon eslint/tsc échouent sur des types « cannot be resolved ».
      - name: Generate Prisma client & build shared
        run: |
          pnpm --filter @df/api exec prisma generate
          pnpm --filter @df/shared build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm --filter @df/web exec playwright install --with-deps chromium

      - name: E2E
        run: pnpm test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
