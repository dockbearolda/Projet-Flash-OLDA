<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ebeae8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Devis Flash · OLDA</title>
    <script>
      // Applique le thème mémorisé avant le premier rendu (évite tout flash).
      // Les fonds doivent rester alignés sur --df-bg de chaque thème (globals.css).
      try {
        var bg = {
          olda: '#ebeae8',
          sable: '#e8e5dd',
          lin: '#ece7dc',
          argile: '#ece4da',
          blush: '#eee4e3',
          brume: '#e9ebee',
          ocean: '#e7eaee',
          givre: '#e2eaea',
          foret: '#e3e8e2',
          prune: '#e8e6ec',
          nuit: '#16181c',
        };
        var t = localStorage.getItem('df:theme');
        if (!bg[t]) t = 'olda';
        if (t !== 'olda') document.documentElement.dataset.dfTheme = t;
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', bg[t]);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
